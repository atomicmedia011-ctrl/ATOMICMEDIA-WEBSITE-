<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Growth Campaign | Atomic Media</title>
  <meta name="description" content="Creator Growth Campaign project by Atomic Media.">
  <style>
    :root { color-scheme: dark; --bg: #050505; --text: #fff; --muted: #a7a7a7; --line: rgba(255,255,255,.16); --accent: #c75a00; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    a { color: inherit; text-decoration: none; }
    .project-header { position: fixed; z-index: 10; inset: 0 0 auto; height: 76px; display: flex; align-items: center; justify-content: space-between; padding: 0 5vw; background: linear-gradient(to bottom, rgba(0,0,0,.76), transparent); }
    .brand { font-size: 14px; font-weight: 800; letter-spacing: .12em; }
    nav { display: flex; gap: 12px; align-items: center; font-size: 13px; font-weight: 800; text-transform: uppercase; }
    nav a { border: 1px solid var(--line); border-radius: 999px; padding: 12px 18px; background: rgba(255,255,255,.08); }
    main { min-height: 100vh; }
    .hero { min-height: 100vh; display: grid; grid-template-columns: minmax(0, .95fr) minmax(360px, 1.05fr); gap: 5vw; align-items: center; padding: 110px 5vw 5vw; }
    .eyebrow { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; margin: 0 0 18px; }
    h1 { margin: 0; font-size: clamp(50px, 7.5vw, 132px); line-height: .88; letter-spacing: -.045em; text-transform: uppercase; }
    h2 { margin: 0; font-size: clamp(28px, 4vw, 64px); line-height: .95; letter-spacing: -.035em; text-transform: uppercase; }
    .desc { color: var(--muted); font-size: clamp(18px, 2vw, 28px); line-height: 1.32; max-width: 740px; margin: 28px 0 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
    .meta span { border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 10px 14px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .cover { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #111; min-height: 360px; display: grid; place-items: center; box-shadow: 0 28px 80px rgba(0,0,0,.45); }
    .cover img { width: 100%; height: 100%; min-height: 360px; object-fit: cover; display: block; }
    .empty-cover, .empty-media { color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; padding: 28px; }
    .content { border-top: 1px solid var(--line); padding: 5vw; display: grid; gap: 56px; }
    .copy { max-width: 980px; }
    .copy p { color: var(--muted); font-size: 18px; line-height: 1.7; }
    .section-title { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .media-card { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #111; }
    .media-card img, .media-card video { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; display: block; background: #000; }
    .media-card-video video { object-fit: contain; }
    .media-card span { display: block; padding: 12px 14px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .error-state { min-height: 100vh; display: grid; place-content: center; gap: 18px; padding: 5vw; text-align: center; }
    .error-state h1 { font-size: clamp(46px, 8vw, 110px); }
    .error-state p { color: var(--muted); }
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; padding-top: 100px; }
      .project-header { padding: 0 18px; }
      nav a { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div data-project-detail data-project-id="creator_growth_campaign"></div>
  <script src="/assets/project-detail-page.js" defer></script>
</body>
</html>
